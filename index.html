<!DOCTYPE html>
<html>
<head>
    <title>Surprise for Annu!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fce4ec; font-family: sans-serif; }
        .step { display: none; text-align: center; }
        .active { display: block; }
        button { padding: 15px 30px; font-size: 1.2rem; background-color: #d81b60; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Audio element (hidden) -->
    <audio id="bdaySong" src="song.mp3" preload="auto"></audio>

    <div id="step1" class="step active">
        <h1>Hello Annu!</h1>
        <button onclick="nextStep(2)">Please click here Annu Maam</button>
    </div>

    <div id="step2" class="step">
        <h1>Sorry for the trouble...</h1>
        <button onclick="nextStep(3)">Please click again</button>
    </div>

    <div id="step3" class="step">
        <h1>Happy Birthday Anamika! 🎉</h1>
        <button onclick="finish()">Celebrate!</button>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            
            // Start audio on first interaction
            if (step === 2) {
                document.getElementById('bdaySong').play();
            }
        }

        function finish() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
